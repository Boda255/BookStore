<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم إرسال الرسالة</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.success-box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: pop 0.5s ease;
}

.check-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 5px solid #4CAF50;
    margin: 0 auto 20px;
    position: relative;
}

.checkmark {
    position: absolute;
    width: 25px;
    height: 50px;
    border-right: 5px solid #4CAF50;
    border-bottom: 5px solid #4CAF50;
    transform: rotate(45deg);
    top: 20px;
    left: 35px;
    animation: draw 0.6s ease forwards;
}

@keyframes draw {
    0% {
        opacity: 0;
        transform: scale(0) rotate(45deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) rotate(45deg);
    }
}

h2 {
    color: #333;
}

p {
    color: #555;
    margin-top: 10px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #2196F3;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    background: #1976D2;
}

@keyframes pop {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>

</head>

<body>

<div class="success-box">
    <div class="check-circle">
        <div class="checkmark"></div>
    </div>

    <h2>🎉 تم إرسال الرسالة بنجاح</h2>
    <p>شكراً لتواصلك معنا</p>

    <a href="index.html" class="btn">🏠 العودة للصفحة الرئيسية</a>
</div>

</body>
</html>
