<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Document</title>
</head>
<body>

    <div class="overlay"></div>

    <div class="form-container">
    <h2>إنشاء حساب</h2>

    <form onsubmit="return goToSuccess(event)">
    <div class="input-group">
        <label for="name1">الاسم الأول</label>
        <input id="name1" type="text" placeholder="اكتب اسمك الأول" required>
    </div>

    <div class="input-group">
        <label for="name2">الاسم الثاني</label>
        <input id="name2" type="text" placeholder="اكتب اسمك الثاني" required>
    </div>

    <div class="input-group">
        <label for="email">البريد الإلكتروني</label>
        <input  id="email" placeholder="@email.com" required>
    </div>

    <div class="input-group">
        <label for="phone">رقم الهاتف</label>
        <input id="phone" type="tel" placeholder="01xxxxxxxxx" required>
    </div>
    <div class="input-group">
        <label for="pasword">كلمه المرور</label>
        <input id="pasword" type="password" placeholder="xxxxxxxx" required>
    </div>

    <button class="btn" type="submit">تسجيل</button>
    </form>

    <div class="footer-text">
            هل لديك حساب بالفعل؟
        <a href="login.html"> تسجيل دخول</a>
    </div>
    </div>
<div class="backhome-container">
    <a href="store.html" class="homebtn">⬅ العودة للصفحة الرئيسية</a>
</div>
</form>
<script>
function goToSuccess(event) {
    event.preventDefault(); // يمنع الريفريش
    window.location.href = "success.html"; // يفتح صفحة النجاح
    return false;
}
</script>
</body>
</html>
