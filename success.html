<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم التسجيل</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background-image: url("background.jpeg");
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    flex-direction: column;
    align-items: center;

}

.success-box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.check-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 5px solid #4CAF50;
    margin: 0 auto 20px;
    position: relative;
}

.checkmark {
    position: absolute;
    width: 25px;
    height: 50px;
    border-right: 5px solid #4CAF50;
    border-bottom: 5px solid #4CAF50;
    transform: rotate(45deg);
    top: 20px;
    left: 35px;
    opacity: 0;
    animation: draw 0.6s ease forwards;
}

@keyframes draw {
    0% {
        opacity: 0;
        transform: scale(0) rotate(45deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) rotate(45deg);
    }
}

h2 {
    color: #333;
}

.buttons {
    margin-top: 20px;
}

.buttons a {
    text-decoration: none;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 25px;
    color: white;
    display: inline-block;
    transition: 0.3s;
}

.books {
    background: #4CAF50;
}

.home {
    background: #2196F3;
}

.buttons a:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="success-box">
    <div class="check-circle">
        <div class="checkmark"></div>
    </div>

    <h2> 🎉 تم التسجيل بنجاح  </h2>
    <p> 👇 تحب تروح فين  </p>

    <div class="buttons">
        <a href="books.html" class="books">📚 صفحة الكتب</a>
        <a href="index.html" class="home">🏠 الصفحة الرئيسية</a>
    </div>
</div>

</body>
</html>
