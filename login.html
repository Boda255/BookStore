<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="overlay"></div>

  <div class="form-container">
    <h2>تسجيل الدخول</h2>

    <form onsubmit="return goToSuccess(event)">
      <div class="input-group">
        <label for="email">الإيميل</label>
        <input id="email" type="email" required placeholder="@email.com">
      </div>

      <div class="input-group">
        <label for="password">كلمة المرور</label>
        <input id="password" type="password" required placeholder="xxxxxxxx">
      </div>

      <button class="btn">دخول</button>
    </form>

    <div class="footer-text">
      ليس لديك حساب؟
      <a href="login2.html">إنشاء حساب</a>
    </div>
  </div>
  <div class="backhome-container">
    <a href="index.html" class="homebtn">⬅ العودة للصفحة الرئيسية</a>
  </div>
  </div>
  <script>
    function goToSuccess(event) {
      event.preventDefault(); // يمنع الريفريش
      window.location.href = "success.html"; // يفتح صفحة النجاح
      return false;
    }
  </script>
</body>

</html>
